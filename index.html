<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Sorter Pro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background-color: #000; 
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 1.5s ease-in-out; 
    }

    .header {
      text-align: center;
      padding: 6vh 20px 3vh;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    h1 { 
      font-size: 8vw; 
      text-transform: uppercase;
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 15px;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      width: 90vw;
      max-width: 500px;
      margin: 0 auto;
    }

    /* Primary upload button */
    .btn-primary {
      position: relative;
      flex-grow: 1;
      background: #fff;
      color: #000;
      padding: 15px 0;
      font-size: 1.2rem;
      font-weight: bold;
      text-transform: uppercase;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      overflow: hidden;
    }

    /* The actual file input is invisible and stretched over the button */
    .btn-primary input[type='file'] {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    /* Secondary clear button */
    .btn-danger {
      background: #333;
      color: #ff4444;
      padding: 0 20px;
      font-size: 1rem;
      font-weight: bold;
      text-transform: uppercase;
      border-radius: 4px;
      border: none;
      cursor: pointer;
    }

    #status {
      margin-top: 15px;
      font-size: 0.9rem;
      opacity: 0.7;
    }

    #gallery { 
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      width: 100vw;
      padding-bottom: 10vh; 
    }

    .photo-card { 
      flex: 1 1 33%; 
      min-width: 100px;
      aspect-ratio: 1; 
      margin: -1px; 
      position: relative; 
      overflow: hidden;
      transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94), z-index 0.3s;
      z-index: 1;
    }

    .photo-card:hover {
      transform: scale(1.05);
      z-index: 10;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }

    img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      border: 1px solid rgba(0,0,0,0.1); 
    }
  </style>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
</head>
<body>

  <div class="header">
    <h1>Color Sorter</h1>
    <div class="controls">
      <div class="btn-primary">
        Add Photos
        <input type="file" id="photo-upload" accept="image/*" multiple>
      </div>
      <button class="btn-danger" id="clear-btn">Clear</button>
    </div>
    <div id="status">Loading memory...</div>
  </div>
  
  <div id="gallery"></div>

  <script>
    const uploadButton = document.getElementById('photo-upload');
    const clearButton = document.getElementById('clear-btn');
    const gallery = document.getElementById('gallery');
    const statusText = document.getElementById('status');
    const colorThief = new ColorThief();

    // --- DATABASE SETUP (IndexedDB) ---
    let db;
    const request = indexedDB.open("ColorSorterDB", 1);

    request.onupgradeneeded = function(event) {
      db = event.target.result;
      // Create a table called 'photos' with an auto-incrementing ID
      db.createObjectStore("photos", { keyPath: "id", autoIncrement:true });
    };

    request.onsuccess = function(event) {
      db = event.target.result;
      loadPhotosFromMemory(); // Load photos as soon as the app opens!
    };

    // --- THE MATH & LOGIC ---
    function getHue(r, g, b) {
      r /= 255; g /= 255; b /= 255;
      const max = Math.max(r, g, b), min = Math.min(r, g, b);
      let h;
      if (max == min) return 0; 
      const d = max - min;
      switch (max) {
        case r: h = (g - b) / d + (g < b ? 6 : 0); break;
        case g: h = (b - r) / d + 2; break;
        case b: h = (r - g) / d + 4; break;
      }
      return (h / 6) * 360;
    }

    // --- THE SHRINKING MACHINE (Canvas) ---
    function compressImage(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_SIZE = 150; // Squish it down to 150 pixels
            let width = img.width;
            let height = img.height;

            if (width > height) {
              if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
            } else {
              if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            
            // Turn it into a tiny JPEG string
            const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.6);
            resolve({ dataUrl: compressedDataUrl, imgElement: img });
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    // --- SAVING AND LOADING ---
    uploadButton.addEventListener('change', async function(event) {
      const files = Array.from(event.target.files);
      if(files.length === 0) return;
      
      statusText.innerText = `Processing ${files.length} photos... Please wait.`;
      
      for (let i = 0; i < files.length; i++) {
        // 1. Shrink it
        const { dataUrl, imgElement } = await compressImage(files[i]);
        
        // 2. Steal color (needs to wait for the image to be fully ready)
        await new Promise(resolve => {
            const tempImg = new Image();
            tempImg.src = dataUrl;
            tempImg.onload = () => {
                const rgb = colorThief.getColor(tempImg);
                const hue = getHue(rgb[0], rgb[1], rgb[2]);
                
                // 3. Save to Database
                const transaction = db.transaction(["photos"], "readwrite");
                const store = transaction.objectStore("photos");
                store.add({ url: dataUrl, rgb: rgb, hue: hue });
                resolve();
            }
        });
        
        // Update the user on progress
        if(i % 5 === 0) statusText.innerText = `Processed ${i + 1} of ${files.length}...`;
      }

      // 4. Reload everything from memory
      uploadButton.value = ''; // Reset the input
      loadPhotosFromMemory();
    });

    function loadPhotosFromMemory() {
      const transaction = db.transaction(["photos"], "readonly");
      const store = transaction.objectStore("photos");
      const request = store.getAll();

      request.onsuccess = function(event) {
        let savedPhotos = event.target.result;
        
        if (savedPhotos.length === 0) {
          gallery.innerHTML = '';
          document.body.style.background = '#000';
          statusText.innerText = 'Memory is empty. Add some photos!';
          return;
        }

        statusText.innerText = `${savedPhotos.length} photos in memory.`;

        // Sort by hue
        savedPhotos.sort((a, b) => a.hue - b.hue);

        // Draw background gradient
        let gradientColors = [];
        let step = Math.max(1, Math.floor(savedPhotos.length / 5));
        for(let i = 0; i < savedPhotos.length; i += step) {
          gradientColors.push(`rgb(${savedPhotos[i].rgb[0]}, ${savedPhotos[i].rgb[1]}, ${savedPhotos[i].rgb[2]})`);
        }
        let lastRgb = savedPhotos[savedPhotos.length - 1].rgb;
        gradientColors.push(`rgb(${lastRgb[0]}, ${lastRgb[1]}, ${lastRgb[2]})`);
        document.body.style.background = `linear-gradient(to bottom, ${gradientColors.join(', ')})`;

        // Draw grid
        gallery.innerHTML = ''; 
        savedPhotos.forEach(photo => {
          const card = document.createElement('div');
          card.className = 'photo-card';
          const img = document.createElement('img');
          img.src = photo.url;
          card.appendChild(img);
          gallery.appendChild(card);
        });
      };
    }

    // --- CLEAR MEMORY ---
    clearButton.addEventListener('click', () => {
      if(confirm("Are you sure you want to delete all photos from the app's memory?")) {
        const transaction = db.transaction(["photos"], "readwrite");
        const store = transaction.objectStore("photos");
        store.clear().onsuccess = () => {
          loadPhotosFromMemory();
        };
      }
    });

  </script>
</body>
</html>
