<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Sorter</title>
  <style>
    /* This makes your app look neat and tidy */
    body { font-family: sans-serif; padding: 20px; }
    img { width: 100px; height: 100px; object-fit: cover; margin: 5px; border-radius: 8px; }
    #gallery { display: flex; flex-wrap: wrap; margin-top: 20px; }
  </style>
</head>
<body>

  <h1>Photo Color Sorter</h1>
  <p>Upload your photos below:</p>
  <input type="file" id="photo-upload" accept="image/*" multiple>
  
  <div id="gallery"></div>

  <script>
    // 1. Grab the button and the gallery area
    const uploadButton = document.getElementById('photo-upload');
    const gallery = document.getElementById('gallery');

    // 2. Tell the app to listen for when you select photos
    uploadButton.addEventListener('change', function(event) {
      
      // Clear the gallery so old photos disappear when you upload new ones
      gallery.innerHTML = ''; 
      
      // Get the list of photos you just picked
      const files = event.target.files;

      // 3. Loop through every single photo you selected
      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        
        // Create a temporary link to the photo so the browser can see it
        const imageUrl = URL.createObjectURL(file);
        
        // Create a new image element
        const img = document.createElement('img');
        img.src = imageUrl;
        
        // Put the image onto the screen!
        gallery.appendChild(img);
      }
    });
  </script>

</body>
</html>
