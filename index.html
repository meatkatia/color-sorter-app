<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Sorter</title>
  <style>
    /* Full-screen reset */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background-color: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow-x: hidden;
      text-align: center;
    }

    /* Functional, minimal typography */
    h1 { 
      font-size: 8vw; 
      text-transform: uppercase;
      font-weight: 900;
      letter-spacing: -1px;
      padding: 6vh 20px 3vh; 
    }

    /* Purely functional, massive button */
    input[type='file'] { 
      appearance: none;
      -webkit-appearance: none;
      width: 90vw; /* Take up most of the screen width */
      max-width: 400px;
      padding: 2.5vh 0;
      font-size: 5vw;
      background: #fff;
      color: #000;
      border: none;
      cursor: pointer;
      font-weight: bold;
      text-transform: uppercase;
      margin: 0 auto 4vh;
      border-radius: 4px;
      display: block;
    }

    /* Strict 3-column grid */
    #gallery { 
      display: grid;
      /* The magic line: Forces exactly 3 equal columns */
      grid-template-columns: repeat(3, 1fr); 
      gap: 4px; /* Tiny gap for maximum density */
      padding: 0 4px 10vh; /* Padding matches gap to keep edges even */
      width: 100vw;
      flex-grow: 1;
      overflow-y: auto;
    }

    /* Minimalist card structure */
    .photo-card { 
      background: #111; /* Very dark background to blend with black body */
      position: relative; /* Allows positioning the swatch over the image */
      aspect-ratio: 1; /* Keeps images perfectly square */
      display: flex;
      flex-direction: column;
      overflow: hidden; /* Keeps image inside borders */
    }

    /* Image fills the square completely */
    img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
    }
    
    /* Prominent color swatch overlay */
    .color-swatch {
      position: absolute; /* Float over the image */
      bottom: 0; /* Attach to bottom */
      left: 0;
      width: 100%; /* Full width of the picture */
      height: 20%; /* Significant strip at the bottom */
      border-top: 1px solid rgba(255,255,255,0.2); /* Subtle separation line */
    }
  </style>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
</head>
<body>

  <h1>Color Sorter</h1>
  
  <input type="file" id="photo-upload" accept="image/*" multiple>
  
  <div id="gallery"></div>

  <script>
    const uploadButton = document.getElementById('photo-upload');
    const gallery = document.getElementById('gallery');
    
    const colorThief = new ColorThief();

    uploadButton.addEventListener('change', function(event) {
      gallery.innerHTML = ''; 
      const files = event.target.files;

      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const imageUrl = URL.createObjectURL(file);
        
        const card = document.createElement('div');
        card.className = 'photo-card';

        const img = document.createElement('img');
        img.src = imageUrl;
        
        const swatch = document.createElement('div');
        swatch.className = 'color-swatch';

        card.appendChild(img);
        card.appendChild(swatch);
        gallery.appendChild(card);

        img.onload = function() {
          const dominantColor = colorThief.getColor(img);
          swatch.style.backgroundColor = `rgb(${dominantColor[0]}, ${dominantColor[1]}, ${dominantColor[2]})`;
        };
      }
    });
  </script>

</body>
</html>
