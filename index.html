<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WARM & FUZZY</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* THE NEO-BRUTALIST RESET */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      font-family: 'Impact', 'Arial Black', sans-serif;
      background-color: #050505; 
      color: #ccff00; 
      padding: 15px;
      overflow-x: hidden;
      text-transform: uppercase;
    }

    h1 { 
      font-size: 22vw; 
      font-weight: 900;
      letter-spacing: -0.05em; 
      line-height: 0.8;
      margin-top: 2vh;
      margin-bottom: 5vh;
      text-align: center;
      color: #ff80bf; 
    }

    #menu { display: flex; flex-direction: column; gap: 20px; padding-bottom: 50px; }

    .friend-btn {
      width: 100%;
      padding: 25px 10px;
      font-size: 12vw;
      font-family: 'Impact', 'Arial Black', sans-serif;
      letter-spacing: -2px;
      border: none;
      cursor: pointer;
      border-radius: 0; 
      transition: transform 0.1s;
    }
    
    .friend-btn:active { transform: scale(0.98); }

    #btn-Evvie { background: #ccff00; color: #050505; } 
    #btn-Joe-C { background: #ff80bf; color: #050505; } 
    #btn-Joe-L { background: #ffffff; color: #050505; } 
    #btn-Perdi { background: #050505; color: #ccff00; border: 4px solid #ccff00; } 
    #btn-Katia { background: #050505; color: #ff80bf; border: 4px solid #ff80bf; } 

    #friend-corner { display: none; }
    
    .back-btn {
      background: transparent;
      color: #ffffff;
      padding: 10px 0;
      font-size: 6vw;
      font-family: 'Impact', 'Arial Black', sans-serif;
      border: none;
      margin-bottom: 20px;
      cursor: pointer;
      text-align: left;
    }

    #current-name {
      font-size: 15vw; 
      letter-spacing: -3px; 
      margin-bottom: 20px;
      color: #ffffff;
      line-height: 1;
    }

    /* THE 8-STYLE COLOR PICKER */
    .color-picker {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .combo-opt {
      height: 60px;
      cursor: pointer;
      border: 3px solid #333;
      transition: transform 0.1s;
    }
    
    .combo-opt:active { transform: scale(0.9); }
    .combo-opt.selected { border: 6px solid #fff; box-shadow: 0 0 15px rgba(255,255,255,0.5); }

    /* THE 8 SPECIFIC THEMES */
    .combo-green-black { background: #ccff00; color: #050505; border-color: #ccff00; } 
    .combo-black-green { background: #050505; color: #ccff00; border-color: #ccff00; } 
    .combo-pink-black { background: #ffb3e6; color: #050505; border-color: #ffb3e6; } 
    .combo-black-pink { background: #050505; color: #ffb3e6; border-color: #ffb3e6; } 
    .combo-light-dark-pink { background: #ffb3e6; color: #b30059; border-color: #b30059; } 
    .combo-dark-light-pink { background: #b30059; color: #ffb3e6; border-color: #ffb3e6; } 
    .combo-white-black { background: #ffffff; color: #050505; border-color: #ffffff; }
    .combo-black-white { background: #050505; color: #ffffff; border-color: #ffffff; } 

    #notes-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin: 30px 0;
    }

    .note-card {
      padding: 25px;
      font-size: 1.5rem;
      font-family: 'Courier New', Courier, monospace; 
      font-weight: bold;
      border: 4px solid transparent; 
      box-shadow: 8px 8px 0px rgba(0,0,0,0.8);
    }

    textarea {
      width: 100%; height: 150px;
      padding: 20px; 
      font-size: 1.5rem;
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      margin-bottom: 10px;
      border-radius: 0;
      border: 4px solid transparent;
      resize: none;
      transition: background 0.2s, color 0.2s;
    }
    textarea:focus { outline: none; }
    textarea::placeholder { opacity: 0.6; color: inherit; }

    .submit-btn {
      width: 100%; padding: 25px;
      font-size: 8vw; 
      font-family: 'Impact', 'Arial Black', sans-serif;
      letter-spacing: -1px;
      background: #ccff00;
      color: #050505;
      border: none;
      cursor: pointer;
      margin-bottom: 50px;
    }
    .submit-btn:active { transform: scale(0.98); }
  </style>
</head>
<body>

  <div id="menu">
    <h1>WARM<br>& FUZZY</h1>
    <button class="friend-btn" id="btn-Evvie" onclick="openCorner('Evvie')">Evvie</button>
    <button class="friend-btn" id="btn-Joe-C" onclick="openCorner('Joe C')">Joe C</button>
    <button class="friend-btn" id="btn-Joe-L" onclick="openCorner('Joe L')">Joe L</button>
    <button class="friend-btn" id="btn-Perdi" onclick="openCorner('Perdi')">Perdi</button>
    <button class="friend-btn" id="btn-Katia" onclick="openCorner('Katia')">Katia</button>
  </div>

  <div id="friend-corner">
    <button class="back-btn" onclick="goHome()">← BACK TO SQUAD</button>
    <h2 id="current-name">NAME</h2>
    
    <div class="color-picker" id="picker">
      <div class="combo-opt combo-green-black selected" id="opt-green-black" onclick="setCombo('green-black')"></div>
      <div class="combo-opt combo-black-green" id="opt-black-green" onclick="setCombo('black-green')"></div>
      <div class="combo-opt combo-pink-black" id="opt-pink-black" onclick="setCombo('pink-black')"></div>
      <div class="combo-opt combo-black-pink" id="opt-black-pink" onclick="setCombo('black-pink')"></div>
      <div class="combo-opt combo-light-dark-pink" id="opt-light-dark-pink" onclick="setCombo('light-dark-pink')"></div>
      <div class="combo-opt combo-dark-light-pink" id="opt-dark-light-pink" onclick="setCombo('dark-light-pink')"></div>
      <div class="combo-opt combo-white-black" id="opt-white-black" onclick="setCombo('white-black')"></div>
      <div class="combo-opt combo-black-white" id="opt-black-white" onclick="setCombo('black-white')"></div>
    </div>
    
    <textarea id="note-text" class="combo-green-black" placeholder="WRITE YOUR NOTE HERE..."></textarea>
    <button class="submit-btn" id="sub-btn" onclick="submitNote()">DROP NOTE</button>

    <div id="notes-list"></div>
  </div>

  <script>
    // 1. Defining variables first so buttons NEVER break
    let currentFriend = '';
    let selectedCombo = 'green-black';
    let supabase;

    // 2. Safe Database Connection
    try {
      const supabaseUrl = 'https://dovjvnierlfkhnokflkn.supabase.co';
      const supabaseKey = 'sb_publishable_l33PQiCwTtp7n6-9g_-_Yg_KSeNox6V';
      supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
    } catch (err) {
      console.error("Database failed to load:", err);
    }

    function setCombo(c) { 
      selectedCombo = c;
      document.getElementById('note-text').className = 'combo-' + c;
      document.querySelectorAll('.combo-opt').forEach(el => el.classList.remove('selected'));
      document.getElementById('opt-' + c).classList.add('selected');
    }

    // 3. The Click Function
    function openCorner(name) {
      currentFriend = name;
      document.getElementById('menu').style.display = 'none';
      document.getElementById('friend-corner').style.display = 'block';
      document.getElementById('current-name').innerText = name;
      
      if (supabase) {
        fetchNotes();
        // Setup realtime updates
        supabase.channel('custom-all-channel')
          .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'notes' }, (payload) => {
            if(payload.new.friend_name === currentFriend) fetchNotes();
          })
          .subscribe();
      } else {
        document.getElementById('notes-list').innerHTML = '<p style="color:red;">Database offline.</p>';
      }
    }

    function goHome() {
      document.getElementById('menu').style.display = 'flex';
      document.getElementById('friend-corner').style.display = 'none';
    }

    async function fetchNotes() {
      const list = document.getElementById('notes-list');
      list.innerHTML = '<p>LOADING...</p>';
      
      try {
        const { data, error } = await supabase.from('notes').select('*').eq('friend_name', currentFriend).order('created_at', { ascending: false });
        
        if (error) throw error;
        
        list.innerHTML = '';
        if (data.length === 0) {
          list.innerHTML = '<p>NO NOTES YET. BE THE FIRST!</p>';
          return;
        }

        data.forEach(n => {
          const div = document.createElement('div');
          div.className = `note-card combo-${n.color_combo || 'green-black'}`;
          div.style.transform = `rotate(${Math.random() * 4 - 2}deg)`;
          div.innerText = n.message;
          list.appendChild(div);
        });
      } catch (err) {
        list.innerHTML = '<p style="color:red;">ERROR LOADING NOTES.</p>';
      }
    }

    async function submitNote() {
      if (!supabase) return alert("Database not connected!");
      
      const msg = document.getElementById('note-text').value;
      if (!msg) return;
      
      document.getElementById('sub-btn').innerText = "SAVING...";
      
      try {
        await supabase.from('notes').insert([{ 
          friend_name: currentFriend, 
          message: msg, 
          color_combo: selectedCombo 
        }]);
        
        document.getElementById('note-text').value = '';
        document.getElementById('sub-btn').innerText = "DROP NOTE";
        fetchNotes(); // Immediately show the new note
      } catch (err) {
        alert("Failed to save note. Try again!");
        document.getElementById('sub-btn').innerText = "DROP NOTE";
      }
    }
  </script>
</body>
</html>
