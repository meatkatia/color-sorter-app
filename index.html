<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WARM & FUZZY</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    /* IGNORANT, BASQUIAT, SCRAPBOOK STYLING */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      font-family: "Courier New", Courier, monospace; /* Typewriter/Scrapbook feel */
      background-color: #f0f0f0; 
      color: #000;
      padding: 20px;
      overflow-x: hidden;
    }

    h1 { 
      font-size: 14vw; 
      text-transform: uppercase;
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 0.9;
      margin-bottom: 30px;
      transform: rotate(-2deg); /* Slightly crooked */
    }

    /* The Main Menu Grid */
    #menu { display: flex; flex-direction: column; gap: 20px; }

    /* Massive, chunky buttons */
    .friend-btn {
      width: 100%;
      padding: 25px 10px;
      font-size: 3rem;
      font-weight: 900;
      text-transform: uppercase;
      border: 8px solid #000; /* Extremely thick borders */
      background: #fff;
      cursor: pointer;
      box-shadow: 12px 12px 0px #000; /* Harsh, solid drop shadow */
      transition: transform 0.1s;
      /* Weird, uneven border radius to look hand-cut */
      border-radius: 2px 15px 4px 20px; 
    }
    .friend-btn:active {
      transform: translate(8px, 8px);
      box-shadow: 4px 4px 0px #000;
    }

    /* Hardcoded colors for the squad */
    #btn-Evvie { background-color: #FF00FF; color: white; } /* Neon Pink */
    #btn-Joe-C { background-color: #FFFF00; } /* Harsh Yellow */
    #btn-Joe-L { background-color: #00FF00; } /* Lime Green */
    #btn-Perdi { background-color: #0000FF; color: white; } /* Deep Blue */
    #btn-Katia { background-color: #FF0000; color: white; } /* Bright Red */

    /* The individual friend's page (hidden by default) */
    #friend-corner { display: none; }
    
    #current-friend-name {
      font-size: 4rem;
      font-weight: 900;
      background: #000;
      color: #fff;
      display: inline-block;
      padding: 10px 20px;
      transform: rotate(3deg);
      margin-bottom: 30px;
    }

    /* The Notes Display */
    #notes-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 40px;
    }

    .note-card {
      background: #fff;
      border: 5px solid #000;
      padding: 20px;
      font-size: 1.5rem;
      font-family: sans-serif;
      font-weight: bold;
      box-shadow: 6px 6px 0px #000;
      border-radius: 10px 2px 10px 2px;
      transform: rotate(-1deg);
    }

    /* The form to leave a note */
    textarea {
      width: 100%;
      height: 150px;
      border: 6px solid #000;
      padding: 15px;
      font-size: 1.5rem;
      font-family: "Courier New", Courier, monospace;
      margin-bottom: 10px;
      box-shadow: 8px 8px 0px #000;
      resize: none;
    }

    .submit-btn, .back-btn {
      width: 100%;
      padding: 20px;
      font-size: 2rem;
      font-weight: 900;
      border: 6px solid #000;
      cursor: pointer;
      box-shadow: 8px 8px 0px #000;
      margin-bottom: 20px;
      text-transform: uppercase;
    }
    .submit-btn { background: #00FF00; } /* Green submit */
    .back-btn { background: #fff; }

  </style>
</head>
<body>

  <div id="menu">
    <h1>WARM<br>& FUZZY</h1>
    <button class="friend-btn" id="btn-Evvie" onclick="openCorner('Evvie')">Evvie</button>
    <button class="friend-btn" id="btn-Joe-C" onclick="openCorner('Joe C')">Joe C</button>
    <button class="friend-btn" id="btn-Joe-L" onclick="openCorner('Joe L')">Joe L</button>
    <button class="friend-btn" id="btn-Perdi" onclick="openCorner('Perdi')">Perdi</button>
    <button class="friend-btn" id="btn-Katia" onclick="openCorner('Katia')">Katia</button>
  </div>

  <div id="friend-corner">
    <button class="back-btn" onclick="goHome()">Back</button>
    <h2 id="current-friend-name">NAME</h2>
    
    <div id="notes-list">
      </div>

    <textarea id="new-note-text" placeholder="LEAVE A NOTE..."></textarea>
    <button class="submit-btn" onclick="submitNote()">DROP NOTE</button>
  </div>

  <script>
    // --- 1. CONNECT TO SUPABASE ---
    // PASTE YOUR URL AND KEY HERE:
    const supabaseUrl = 'YOUR_SUPABASE_URL_HERE';
    const supabaseKey = 'YOUR_SUPABASE_ANON_KEY_HERE';
    
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    // --- 2. APP STATE ---
    let currentFriend = '';

    // --- 3. NAVIGATION ---
    function openCorner(name) {
      currentFriend = name;
      document.getElementById('menu').style.display = 'none';
      document.getElementById('friend-corner').style.display = 'block';
      document.getElementById('current-friend-name').innerText = name;
      
      // Load their notes immediately
      fetchNotes();
    }

    function goHome() {
      document.getElementById('menu').style.display = 'flex';
      document.getElementById('friend-corner').style.display = 'none';
      document.getElementById('new-note-text').value = ''; // clear input
    }

    // --- 4. FETCH NOTES FROM CLOUD ---
    async function fetchNotes() {
      const notesList = document.getElementById('notes-list');
      notesList.innerHTML = '<p style="font-weight:bold; font-size: 1.5rem;">LOADING...</p>';

      const { data, error } = await supabase
        .from('notes')
        .select('*')
        .eq('friend_name', currentFriend)
        .order('created_at', { ascending: false });

      if (error) {
        notesList.innerHTML = '<p>ERROR LOADING NOTES.</p>';
        return;
      }

      notesList.innerHTML = ''; // clear loading text

      if (data.length === 0) {
        notesList.innerHTML = '<p style="font-weight:bold; font-size: 1.5rem;">NO NOTES YET. BE THE FIRST.</p>';
      } else {
        data.forEach(note => {
          const card = document.createElement('div');
          card.className = 'note-card';
          // Add a random slight rotation to make it feel messy
          const randomRot = Math.random() * 4 - 2; 
          card.style.transform = `rotate(${randomRot}deg)`;
          card.innerText = note.message;
          notesList.appendChild(card);
        });
      }
    }

    // --- 5. SUBMIT A NEW NOTE ---
    async function submitNote() {
      const textInput = document.getElementById('new-note-text');
      const message = textInput.value.trim();

      if (message === '') return; // Don't submit empty notes

      // Change button text while it saves
      const btn = document.querySelector('.submit-btn');
      btn.innerText = 'SAVING...';

      const { error } = await supabase
        .from('notes')
        .insert([
          { friend_name: currentFriend, message: message }
        ]);

      if (!error) {
        textInput.value = ''; // Clear the box
        fetchNotes(); // Reload the list so the new note appears!
      } else {
        alert("Wait, something went wrong saving that.");
      }

      btn.innerText = 'DROP NOTE';
    }
  </script>

</body>
</html>
