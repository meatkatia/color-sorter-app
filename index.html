<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Sorter</title>
  <style>
    /* Full-screen reset and layout */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; /* Explicitly use big chunky sans-serif if possible, fallback generally */
      font-weight: bold; /* Make all text bold */
      background-color: #000; /* Dramatic black background for loudness */
      color: #fff; /* High-contrast white text */
      overflow-x: hidden; /* Prevent horizontal scrolling */
      display: flex;
      flex-direction: column;
      height: 100vh; /* Fill full height */
      text-align: center; /* Center-align for loudness */
    }

    /* Huge bold heading, loud and prominent */
    h1 { 
      font-size: 10vw; /* Extremely large viewport-based size for loudness, responsive */
      text-transform: uppercase; /* All caps for maximum impact */
      letter-spacing: -2px; /* Tight letter spacing for bold feel */
      padding: 10vh 20px 5vh; /* Large top/bottom padding to fill space and add impact */
      line-height: 1.1;
    }

    /* Loud, minimal paragraph text, large and centered */
    p { font-size: 5vw; padding: 0 20px 5vh; opacity: 0.8; }

    /* Minimal, huge upload button, centered and big */
    input[type='file'] { 
      appearance: none;
      -webkit-appearance: none;
      padding: 2vh 4vw; /* Huge padding */
      font-size: 6vw; /* Huge font size */
      background: #fff; /* Bright white contrasting button */
      color: #000; /* Black text on white button */
      border: 4px solid #fff; /* Solid border same color as background */
      cursor: pointer;
      font-weight: 900; /* Extra bold for button */
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 0 auto 5vh; /* Centered with large bottom margin to clear grid */
      display: inline-block; /* Ensure it centers correctly */
      border-radius: 8px; /* Slightly smoother but still bold */
    }

    /* Full-screen grid for photos, densely packed, filling nearly all space */
    #gallery { 
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); /* Dense, responsive grid with large minimum photo size */
      gap: 10px; /* Minimal but distinct gap for density */
      padding: 0 10px 10vh; /* Full width padding, large bottom padding to fill space and clear scroll */
      width: 100vw; /* Stretch to full viewport width */
      flex-grow: 1; /* Make gallery grow to fill remaining vertical space */
      overflow-y: auto; /* Allow vertical scrolling within full screen layout */
    }

    /* Polaroid style with large, simplified, space-filling elements */
    .photo-card { 
      background: #1a1a1a; /* Darker card background on black for subtle contrast */
      padding: 5px; /* Minimal padding for maximum density */
      border: 3px solid #333; /* Thick border adding presence */
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      aspect-ratio: 1; /* Keep photo cards square for consistent impactful grid */
      transition: transform 0.2s ease-in-out, opacity 0.2s ease-in-out; /* Smooth hover effect */
    }
    
    .photo-card:hover { transform: scale(1.03); opacity: 0.9; } /* Slight scale and opacity on hover for interaction */

    /* Maximum image size, filling card as much as possible */
    img { 
      width: 100%; height: auto; 
      object-fit: cover; /* Crop to fill */
      border-radius: 4px;
      flex-grow: 1; /* Image grows to fill remaining vertical space in square card */
    }
    
    /* Huge color swatch below image, highly prominent */
    .color-swatch {
      width: 10vw; /* Huge responsive width, making them loud circles */
      height: 10vw; /* Square dimension for circles */
      border-radius: 50%; /* Circle shape for impact */
      margin: 10px 0; /* Clear spacing from image and bottom */
      border: 3px solid #fff; /* Thick border same color as text for consistency */
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.3); /* Subtle glow on swatch for impact */
    }
  </style>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
</head>
<body>

  <h1>Color<br>Sorter</h1> <p>Your Photos Sorted Loudly</p>
  <input type="file" id="photo-upload" accept="image/*" multiple>
  
  <div id="gallery"></div>

  <script>
    const uploadButton = document.getElementById('photo-upload');
    const gallery = document.getElementById('gallery');
    
    const colorThief = new ColorThief();

    uploadButton.addEventListener('change', function(event) {
      gallery.innerHTML = ''; 
      const files = event.target.files;

      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const imageUrl = URL.createObjectURL(file);
        
        const card = document.createElement('div');
        card.className = 'photo-card';

        const img = document.createElement('img');
        img.src = imageUrl;
        
        const swatch = document.createElement('div');
        swatch.className = 'color-swatch';

        card.appendChild(img);
        card.appendChild(swatch);
        gallery.appendChild(card);

        img.onload = function() {
          const dominantColor = colorThief.getColor(img);
          swatch.style.backgroundColor = `rgb(${dominantColor[0]}, ${dominantColor[1]}, ${dominantColor[2]})`;
          
          /* Add some variation for loudness: potentially slightly shift colors based on position/time to make them vibrate? 
             No, keep it true for sorting demo, but make swatches *bigger* - achieved in CSS already.
             Maybe make swatches pulse slightly? Not essential and could be annoying, keep it bold static presence.
          */
        };
      }
    });
  </script>

</body>
</html>
